<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ই-বুক রিডার</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Serif Bengali', serif;
            background-color: #0b0b0d;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* স্ক্রিনের বাড়তি স্ক্রল বন্ধ রাখার জন্য */
        }
        .top-bar {
            width: 100%;
            background: #16161f;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
        }
        .back-btn { color: #89b4fa; text-decoration: none; font-size: 0.9rem; }
        .book-title-display { font-size: 1rem; color: #a6adc8; font-weight: 600; }
        
        #reader-container {
            width: 100%;
            height: calc(100vh - 53px); /* টপ-বার বাদে পুরো স্ক্রিন */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #11111b;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">◀ লাইব্রেরিতে ফিরুন</a>
        <div class="book-title-display" id="current-title">লোডিং...</div>
        <div style="width: 100px;"></div> <!-- ব্যালেন্সের জন্য -->
    </div>

    <div id="reader-container">
        <!-- এখানে গুগল ড্রাইভের বা লোকাল PDF রিডার লোড হবে -->
    </div>

    <script>
        // URL থেকে বইয়ের আইডি খোঁজা
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('book');

        // JSON থেকে আইডি মিলিয়ে PDF এবং নাম লোড করা
        fetch('books.json')
            .then(res => res.json())
            .then(books => {
                const currentBook = books.find(b => b.id === bookId);
                if(currentBook) {
                    // বইয়ের নাম টপ-বারে সেট করা
                    document.getElementById('current-title').textContent = currentBook.title;
                    
                    // রিডার কন্টেইনারে ড্রাইভ বা পিডিএফ লিংক আইফ্রেম হিসেবে পুশ করা
                    const container = document.getElementById('reader-container');
                    container.innerHTML = `
                        <iframe 
                            src="${currentBook.pdf}" 
                            allow="autoplay">
                        </iframe>
                    `;
                } else {
                    document.getElementById('current-title').textContent = "ভুল লিঙ্ক";
                    document.getElementById('reader-container').innerHTML = "<p style='color: #f38ba8;'>বইটি খুঁজে পাওয়া যায়নি!</p>";
                }
            })
            .catch(err => {
                console.error("Error loading JSON:", err);
                document.getElementById('reader-container').innerHTML = "<p style='color: #f38ba8;'>উপাত্ত লোড করতে সমস্যা হয়েছে।</p>";
            });
    </script>
</body>
</html>
