<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ই-বুক রিডার</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Serif Bengali', serif;
            background-color: #0b0b0d;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .top-bar {
            width: 100%;
            background: #16161f;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { color: #89b4fa; text-decoration: none; font-size: 0.9rem; }
        .controls { display: flex; gap: 15px; align-items: center; }
        .btn { background: none; border: none; color: #89b4fa; font-size: 1rem; cursor: pointer; }
        .btn:hover { color: #f38ba8; }
        #page-info { font-size: 0.9rem; color: #a6adc8; }
        #pdf-render {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 30px 0;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">◀ লাইব্রেরিতে ফিরুন</a>
        <div class="controls">
            <button class="btn" id="prev-page">পূর্ববর্তী</button>
            <span id="page-info">পাতা: <span id="page-num">1</span> / <span id="page-count">0</span></span>
            <button class="btn" id="next-page">পরবর্তী</button>
        </div>
        <div style="width: 100px;"></div> <!-- জাস্ট ব্যালেন্সের জন্য -->
    </div>

    <canvas id="pdf-render"></canvas>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pdfDoc = null, pageNum = 1, pageIsRendering = false, pageNumPending = null;
        const scale = 1.5, canvas = document.getElementById('pdf-render'), ctx = canvas.getContext('2d');

        // URL থেকে বইয়ের আইডি খোঁজা
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('book');

        const renderPage = num => {
            pageIsRendering = true;
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                const renderCtx = { canvasContext: ctx, viewport: viewport };
                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumPending !== null) { renderPage(pageNumPending); pageNumPending = null; }
                });
                document.getElementById('page-num').textContent = num;
            });
        };

        const queueRenderPage = num => { if (pageIsRendering) { pageNumPending = num; } else { renderPage(num); } };
        const showPrevPage = () => { if (pageNum <= 1) return; pageNum--; queueRenderPage(pageNum); window.scrollTo(0,0); };
        const showNextPage = () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; queueRenderPage(pageNum); window.scrollTo(0,0); };

        // JSON থেকে আইডি মিলিয়ে PDF লোড করা
        fetch('books.json')
            .then(res => res.json())
            .then(books => {
                const currentBook = books.find(b => b.id === bookId);
                if(currentBook) {
                    pdfjsLib.getDocument(currentBook.pdf).promise.then(pdfDoc_ => {
                        pdfDoc = pdfDoc_;
                        document.getElementById('page-count').textContent = pdfDoc.numPages;
                        renderPage(pageNum);
                    });
                }
            });

        document.getElementById('prev-page').addEventListener('click', showPrevPage);
        document.getElementById('next-page').addEventListener('click', showNextPage);
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') showNextPage();
            if (e.key === 'ArrowLeft') showPrevPage();
        });
    </script>
</body>
</html>
