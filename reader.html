<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-book Reader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Serif Bengali', serif;
            background-color: #0b0b0d;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: #16161f;
            border-bottom: 1px solid #313244;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            color: #f38ba8;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #f5e0dc; }
        .book-header-title { font-size: 1.2rem; font-weight: 600; color: #cdd6f4; }
        .reader-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 60px);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .error-msg {
            text-align: center;
            padding: 50px;
            color: #f38ba8;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← লাইব্রেরিতে ফিরুন</a>
        <div class="book-header-title" id="book-title">বই লোড হচ্ছে...</div>
        <div style="width: 100px;"></div> <!-- ব্যালেন্স রাখার জন্য ডামি ডাইভ -->
    </header>

    <div class="reader-container" id="reader-container">
        <!-- জাভাস্ক্রিপ্ট দিয়ে এখানে পিডিএফ লোড হবে -->
    </div>

    <script>
        // ইউআরএল থেকে বইয়ের আইডি (ID) নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('book');

        if (bookId) {
            fetch('books.json')
                .then(res => res.json())
                .then(books => {
                    // আইডি অনুযায়ী নির্দিষ্ট বইটি খোঁজা
                    const currentBook = books.find(b => b.id === bookId);

                    if (currentBook) {
                        // হেডার টাইটেল চেঞ্জ করা
                        document.getElementById('book-title').innerText = currentBook.title;
                        
                        // আইফ্রেম দিয়ে পিডিএফ ফাইল লোড করা
                        document.getElementById('reader-container').innerHTML = `
                            <iframe src="${currentBook.pdf}" width="100%" height="100%"></iframe>
                        `;
                    } else {
                        document.getElementById('reader-container').innerHTML = `<p class="error-msg">দুঃখিত, বইটি খুঁজে পাওয়া যায়নি।</p>`;
                    }
                })
                .catch(err => {
                    document.getElementById('reader-container').innerHTML = `<p class="error-msg">ডাটা লোড করতে সমস্যা হচ্ছে।</p>`;
                });
        } else {
            document.getElementById('reader-container').innerHTML = `<p class="error-msg">কোনো বই সিলেক্ট করা হয়নি।</p>`;
        }
    </script>
</body>
</html>
